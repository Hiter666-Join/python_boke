{% extends "base.html" %}

{% block title %}文章列表 - Hiter的博客{% endblock %}

{% block content %}

<div class="card">
    <h1>文章列表</h1>
    {% if items %}
        <div class="article-cards">
        {% for item in items %}
            <a class="article-card" href="/posts/{{ item.slug }}">
                <div class="card-title">{{ item.title }}</div>
                <div class="card-meta">📖 阅读全文 </div>
            </a>
        {% endfor %}
        </div>
    {% else %}
        <p class="empty">暂无文章，稍后再来看看吧~</p>
    {% endif %}
</div>

<style>
/* 整个网格 */
.article-cards{
    display:grid;
    gap:15px;
    margin-top:20px;
}

/* 单卡片：毛玻璃 */
.article-card{
    display:block;
    background:rgba(255,255,255,.25);
    border:1px solid rgba(255,255,255,.35);
    border-left:4px solid var(--accent);
    border-radius:8px;
    padding:18px 20px;
    color:#4b5563;
    text-decoration:none;
    transition:all .3s ease;
    position:relative;
    overflow:hidden;
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
}

/* 渐变遮罩（最低层） */
.article-card::before{
    content:'';
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0;
    background:linear-gradient(90deg, var(--accent-light) 0%, transparent 100%);
    transition:width .3s ease;
    z-index:1;
}

/* 文字块（最高层） */
.card-title,
.card-meta{
    position:relative;
    z-index:2;
}

/* 悬停效果 */
.article-card:hover{
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transform:translateY(-2px);
}
.article-card:hover::before{
    width:100%;
}

/* 彩色循环（毛玻璃淡色） */
.article-card:nth-child(4n+1){--accent:#6366f1;--accent-light:rgba(99,102,241,.15);}
.article-card:nth-child(4n+2){--accent:#10b981;--accent-light:rgba(16,185,129,.15);}
.article-card:nth-child(4n+3){--accent:#f59e0b;--accent-light:rgba(245,158,11,.15);}
.article-card:nth-child(4n+4){--accent:#ef4444;--accent-light:rgba(239,68,68,.15);}
</style>

{% endblock %}
