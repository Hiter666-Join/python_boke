<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>留言板 - Hiter的博客</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="http://127.0.0.1:8801/dist/Artalk.css" rel="stylesheet">
  <script src="http://127.0.0.1:8801/dist/Artalk.js"></script>

  <style>
    /* 全屏背景图 */
    html,body{
      margin:0;height:100%;
      background:url(/static/img/lyb.jpg) no-repeat center/cover fixed;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
      font-size:15px;line-height:1.6;color:#fff;
      display:flex;flex-direction:column;
    }

    /* 标题 */
    h1{text-align:center;font-size:28px;margin:40px 0 30px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.35);letter-spacing:1px}

    #Comments{
      max-width:740px;margin:0 auto 40px;
      background:rgba(255,255,255,0.60);
      border:1px solid rgba(255,255,255,.2);
      border-radius:12px;
      backdrop-filter:blur(12px);
      box-shadow:0 8px 32px rgba(0,0,0,.25);
      padding:25px 30px;
      animation:shine 8s infinite linear}
    @keyframes shine{
      0%{box-shadow:0 8px 32px rgba(0,0,0,.25),0 0 16px rgba(102,126,234,.2)}
      50%{box-shadow:0 8px 32px rgba(0,0,0,.25),0 0 24px rgba(102,126,234,.4)}
      100%{box-shadow:0 8px 32px rgba(0,0,0,.25),0 0 16px rgba(102,126,234,.2)}
    }

    /* 底部居中按钮 */
    .back{
      margin-top:auto;
      padding:20px 0;
      text-align:center
    }
    .btn-home{
      display:inline-block;
      padding:10px 24px;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:#fff;
      border-radius:24px;
      font-size:15px;
      text-decoration:none;
      box-shadow:0 4px 15px rgba(102,126,234,.4);
      transition:.3s}
    .btn-home:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(102,126,234,.6)
    }

    @media(max-width:600px){
      #Comments{padding:20px 15px}
      h1{font-size:24px;margin:30px 0 20px}
    }
    /* 统计条 */
    .stat-bar{
        max-width:740px;margin:20px auto 0;
        text-align:center;font-size:14px;color:#fff;
        background:rgba(255,255,255,.25);border-radius:16px;
        padding:6px 0;backdrop-filter:blur(4px);
    }
    .stat-bar span{margin:0 10px}
  </style>
    <!-- 手机端留言板美化 开始 -->
<style>
@media (max-width: 600px) {
  /* 1. 背景用半透明黑遮一层，突出内容 */
  body {
    background:
      linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
      url(/static/img/lyb.jpg) no-repeat center/cover fixed;
  }

  /* 2. 标题缩小 & 紧凑 */
  h1 {
    font-size: 22px;
    margin: 24px 16px 16px;
    letter-spacing: .5px;
  }

  /* 3. 评论区圆角更大 + 内边距更小 */
  #Comments {
    margin: 0 12px 24px;
    padding: 16px;
    border-radius: 16px;
    backdrop-filter: blur(16px);
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
  }

  /* 4. 统计条圆角 + 更小字号 */
  .stat-bar {
    margin: 12px 12px 0;
    font-size: 12px;
    padding: 4px 0;
    border-radius: 12px;
  }

  /* 5. 关闭按钮缩小 & 置底居中 */
  .back {
    padding: 12px 0 20px;
  }
  .btn-home {
    padding: 8px 20px;
    font-size: 14px;
    border-radius: 20px;
  }

  /* 6. Artalk 内部元素再紧凑 */
  .atk-list-container { padding: 0 !important; }
  .atk-main-editor { padding: 12px !important; }
  .atk-comment { padding: 10px 0 !important; }
}
</style>
<!-- 手机端留言板美化 结束 -->
</head>

<body>
    <div class="stat-bar">
        <span>浏览量：<span class="artalk-pv-count">加载中...</span></span>
        <span>评论数：<span class="artalk-comment-count">加载中...</span></span>
    </div>
  <h1> 💖 留言板 </h1>
  <div id="Comments"></div>

  <div class="back">
  <button class="btn-home" onclick="closePage()">关闭页面</button>
</div>

<script>
  function closePage() {
    // 尝试关闭
    window.close();
    // 回退方案
    setTimeout(() => {
      alert('如未自动关闭，请手动关闭本页');
    }, 200);
  }
</script>

  <script>
    Artalk.init({
      el: '#Comments',
      pageKey: '/msg',
      pageTitle: '留言板',
      server: 'http://127.0.0.1:8801',
      site: 'Hiter的留言板',
      locale: 'zh-CN',
      emoticons: 'https://cdn.jsdelivr.net/gh/ArtalkJS/Emoticons/grps/default.json'
    })
  </script>
</body>
</html>
